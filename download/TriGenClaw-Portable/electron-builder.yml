appId: com.trigen.claw
productName: TriGenClaw

directories:
  output: release
  buildResources: build

files:
  - main.js
  - preload.js
  - offline-cache.js
  - index.html
  - css/
  - js/
  - icons/
  - package.json

extraResources:
  - from: icons/
    to: icons/
  - from: build/
    to: build/

asar: true

win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: TriGenClaw-${version}-win-Setup.${ext}
  icon: build/icon.png

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  artifactName: TriGenClaw-${version}-mac.${ext}
  icon: build/icon.png
  category: public.app-category.productivity

linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  artifactName: TriGenClaw-${version}-linux.${ext}
  icon: build/icon.png
  maintainer: TriGen <admin@j3trisheng.com>
  category: Utility

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: TriGenClaw
  uninstallDisplayName: TriGenClaw

publish: null
