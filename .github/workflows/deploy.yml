name: TriGen Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy Frontend
        if: ${{ secrets.SSH_PRIVATE_KEY != '' }}
        run: |
          which ssh-agent || apt-get update && apt-get install -y openssh-client
          eval $(ssh-agent -s)
          echo "${{ secrets.SSH_PRIVATE_KEY }}" | ssh-add -
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          scp -o StrictHostKeyChecking=no index.html landing.html dashboard.html root@120.79.17.184:/home/admin/nexus-studio/
          scp -o StrictHostKeyChecking=no -r js root@120.79.17.184:/home/admin/nexus-studio/js/

      - name: Deploy Backend
        if: ${{ secrets.SSH_PRIVATE_KEY != '' }}
        run: |
          eval $(ssh-agent -s)
          echo "${{ secrets.SSH_PRIVATE_KEY }}" | ssh-add -
          scp -o StrictHostKeyChecking=no server.js root@120.79.17.184:/home/admin/ai-nexus/
          ssh -o StrictHostKeyChecking=no root@120.79.17.184 "cd /home/admin/ai-nexus && pm2 restart server.js"

      - name: Skip Deploy (secrets not configured)
        if: ${{ secrets.SSH_PRIVATE_KEY == '' }}
        run: echo "SSH secrets not configured - skipping auto-deploy"
