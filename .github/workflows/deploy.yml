name: TriGen Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy Frontend
        run: |
          scp -o StrictHostKeyChecking=no new-nexus/index.html root@120.79.17.184:/home/admin/nexus-studio/index.html

      - name: Deploy Backend
        run: |
          scp -o StrictHostKeyChecking=no server.js package.json root@120.79.17.184:/home/admin/nexus-hub/
          ssh -o StrictHostKeyChecking=no root@120.79.17.184 "cd /home/admin/nexus-hub && pm2 restart nexus-server"

    env:
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
