name: TriGenClaw Desktop Build

on:
  push:
    paths:
      - 'download/source/**'
      - 'download/trigenclaw-build/**'
      - 'download/package.json'
  workflow_dispatch:
    inputs:
      target:
        description: 'Build target (win/mac/linux/all)'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - win
          - mac
          - linux

jobs:
  build-win:
    name: Build Windows
    if: github.event_name != 'workflow_dispatch' || inputs.target == 'all' || inputs.target == 'win'
    runs-on: windows-latest
    defaults:
      run:
        working-directory: download/trigenclaw-build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm install
      - name: Sync source files
        run: |
          Copy-Item -Path ..\source\index.html -Destination .\ -Force
          Copy-Item -Path ..\source\main.js -Destination .\ -Force
          Copy-Item -Path ..\source\preload.js -Destination .\ -Force
          Copy-Item -Path ..\source\css\ -Destination .\css\ -Recurse -Force
          Copy-Item -Path ..\source\js\ -Destination .\js\ -Recurse -Force
      - name: Build
        run: npm run dist:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TriGenClaw-Windows
          path: download/trigenclaw-build/release/TriGenClaw-*-win-Setup.exe

  build-mac:
    name: Build macOS
    if: github.event_name != 'workflow_dispatch' || inputs.target == 'all' || inputs.target == 'mac'
    runs-on: macos-latest
    defaults:
      run:
        working-directory: download/trigenclaw-build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm install
      - name: Sync source files
        run: |
          cp ../source/index.html ./
          cp ../source/main.js ./
          cp ../source/preload.js ./
          cp -r ../source/css/* ./css/
          cp -r ../source/js/* ./js/
      - name: Build
        run: npm run dist:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TriGenClaw-macOS
          path: download/trigenclaw-build/release/TriGenClaw-*-mac.dmg

  build-linux:
    name: Build Linux
    if: github.event_name != 'workflow_dispatch' || inputs.target == 'all' || inputs.target == 'linux'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: download/trigenclaw-build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm install
      - name: Sync source files
        run: |
          cp ../source/index.html ./
          cp ../source/main.js ./
          cp ../source/preload.js ./
          cp -r ../source/css/* ./css/
          cp -r ../source/js/* ./js/
      - name: Build
        run: npm run dist:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TriGenClaw-Linux
          path: download/trigenclaw-build/release/TriGenClaw-*-linux.*
