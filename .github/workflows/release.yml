name: Y·NEX Desktop Release

on:
  push:
    branches: [main]
    paths:
      - 'download/source/**'
      - 'download/ynex-desktop-build/**'
      - 'download/package.json'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如 1.0.2，留空自动递增)'
        required: false
        default: ''

jobs:
  build-and-release:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: download/ynex-desktop-build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Determine version
        id: version
        shell: pwsh
        run: |
          $ver = "${{ github.event.inputs.version }}"
          if (-not $ver) {
            $now = Get-Date -Format "yyyyMMdd.HHmm"
            $sha = "${{ github.sha }}".Substring(0, 7)
            $ver = "1.0.$now+$sha"
          }
          echo "version=$ver" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          echo "Using version: $ver"

      - name: Build installer + portable ZIP
        shell: pwsh
        run: |
          $ver = "${{ steps.version.outputs.version }}"
          
          # 打包安装程序 (electron-builder)
          npm run dist:win
          
          # 同时创建 ZIP 便携版
          $zipName = "Y·NEX Desktop-$ver-Portable.zip"
          if (Test-Path "release\win-unpacked") {
            Compress-Archive -Path "release\win-unpacked\*" -DestinationPath "release\$zipName" -Force
            echo "✅ Portable ZIP: $zipName"
            # 复制一个固定版名方便 latest 链接
            Copy-Item "release\$zipName" "release\Y·NEX Desktop-Portable.zip" -Force
          }
          
          # 列出产物
          Get-ChildItem release\ | Select-Object Name, Length

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Y·NEX Desktop v${{ steps.version.outputs.version }}
          body: |
            ## Y·NEX Desktop v${{ steps.version.outputs.version }}
            
            ### 下载
            - ⬇️ **安装包**: `Y·NEX Desktop-*-win-Setup.exe`
            - 📦 **便携版 (免安装)**: `Y·NEX Desktop-*-Portable.zip`
            
            ### 更新内容
            - 安全加固: CSP + 文件系统沙箱 + URL校验
            - 修复: 桌面端启动崩溃问题
            - 同步: 最新模型列表与前端功能
            
            > 便携版解压后直接运行 `Y·NEX Desktop.exe` 即可，无需安装。
          draft: false
          prerelease: false
          files: |
            download/ynex-desktop-build/release/Y·NEX Desktop-*.exe
            download/ynex-desktop-build/release/Y·NEX Desktop-*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
